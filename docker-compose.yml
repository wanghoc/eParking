services:
  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: eparking_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-eparking_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-eparking_password_2024}
      POSTGRES_DB: ${DB_DATABASE_NAME:-eParking_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - eparking_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-eparking_user} -d ${DB_DATABASE_NAME:-eParking_db}" ]
      timeout: 20s
      retries: 10
      interval: 10s
      start_period: 20s

  # Backend API
  backend:
    build:
      context: ./BE
      dockerfile: Dockerfile
    container_name: eparking_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${BACKEND_PORT:-5000}
      DB_HOST: postgres
      DB_USER: ${DB_USER:-eparking_user}
      DB_PASSWORD: ${DB_PASSWORD:-eparking_password_2024}
      DB_DATABASE_NAME: ${DB_DATABASE_NAME:-eParking_db}
      DB_PORT: 5432
      DATABASE_URL: "postgresql://${DB_USER:-eparking_user}:${DB_PASSWORD:-eparking_password_2024}@postgres:5432/${DB_DATABASE_NAME:-eParking_db}?schema=public"
      USE_PRISMA: ${USE_PRISMA:-true}
      USE_ML: ${USE_ML:-true}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      PYTHONUNBUFFERED: 1
    ports:
      - "5000:5000"
      - "5001:5001"
    volumes:
      - detected_plates:/app/detected_plates
    networks:
      - eparking_network
    healthcheck:
      test: [ "CMD", "sh", "-c", "curl -fsS http://localhost:5000/api/health || exit 1" ]
      timeout: 10s
      retries: 5
      interval: 30s
      start_period: 20s

  # Frontend React App
  frontend:
    build:
      context: ./FE
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=http://localhost:5000
        - REACT_APP_ENVIRONMENT=production
    container_name: eparking_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - eparking_network

networks:
  eparking_network:
    driver: bridge
    name: eparking_network

volumes:
  pg_data:
    driver: local
    name: eparking_pg_data
  detected_plates:
    driver: local
    name: eparking_detected_plates
